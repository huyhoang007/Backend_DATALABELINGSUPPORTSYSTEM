server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/DataLabeling}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:thubinh}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 100MB

  # Serve static files từ thư mục uploads
  web:
    resources:
      static-locations: classpath:/static/

azure:
  storage:
    connection-string: ${AZURE_STORAGE_CONNECTION_STRING:}
    container-name: ${AZURE_STORAGE_CONTAINER:uploads}

logging:
  level:
    com.datalabeling.datalabelingsupportsystem: DEBUG
    org.springframework.aop: DEBUG
    org.aspectj: DEBUG

jwt:
  secret: ibelievewecandoitmyguysneverstopgoingweneedtogoforeverlifeisanunstoppablejourneyofobstaclesinwhichwecannotavoid
  expiration: 86400000

app:
  upload:
    path: uploads
